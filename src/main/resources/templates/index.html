<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PokeApp</title>
      <style>
        :root{
        --rojo_basico: #E63946;

        }

        *{
        box-sizing: border-box;
        margin: 0;
        padding: 0;

        }

        body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #FFFDF5;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        }

        .card {
        background: white;
        padding: 40px;
        border-radius: 30px;
        box-shadow: 0 10px 0px #FDE68A;
        border: 4px solid #FF8A8A;
        width: 100%;
        max-width: 380px;
        text-align: center;
        }

        .alert {
        border-radius: 12px;
        padding: 14px 16px;
        border: none;
        font-size: 0.9rem;
        }
        .alert-danger {
        background: rgba(255, 107, 107, 0.15);
        color: #FF6B6B;
        border-left: 4px solid #FF6B6B;
        }
        .alert-success {
        background: rgba(78, 205, 196, 0.15);
        color: #4ECDC4;
        border-left: 4px solid #4ECDC4;
        }

        @keyframes fadeInUp {
        from {
        opacity: 0;
        transform: translateY(20px);
        }
        to {
        opacity: 1;
        transform: translateY(0);
        }
        }
        .login-card {
        animation: fadeInUp 0.5s ease-out;
        }

        .form-label{

        font-weight: 500;
        font-size: 0.9rem;
        margin-bottom: 8px;
        border-radius: 12px;
        }

        .form-control{
        padding: 14px 16px;
        }

        button{
        background-color: #FF8A8A;
        color: white;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        padding:15px;
        width: 100%;
        box-shadow: 0 4px 0px #E57373;
        }

        button:hover{
        transform: translateY(2px); box-shadow: 0 2px 0 #E57373;
        }

        .btn-register { background: #BAE6FD; color: #0369A1; box-shadow: 0 4px 0 #7DD3FC; margin-top: 10px; }


    </style>
</head>
<body>
<div class="card">
    <h1>PokeApp</h1>
    <p>Tu app de Pokémon</p>
    <a th:href="@{/web/login}" class="btn-login">Iniciar sesión</a>
    <a th:href="@{/web/register}" class="btn-register">Registrarse</a>
</div>
</body>
</html>
