<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Valoraciones - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .topbar { background: #cc0000; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        .topbar a { color: white; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="topbar">
    <span>⭐ Moderar Valoraciones</span>
    <div style="display:flex; gap:16px;">
        <a th:href="@{/web/admin}">← Panel</a>
        <a th:href="@{/web/logout}">Cerrar sesión</a>
    </div>
</div>
<div class="container py-4">
    <table class="table table-bordered bg-white">
        <thead class="table-dark">
            <tr><th>ID</th><th>Autor</th><th>Puntuación</th><th>Comentario</th><th>Fecha</th><th>Acción</th></tr>
        </thead>
        <tbody>
            <tr th:each="v : ${valoraciones}">
                <td th:text="${v.id}"></td>
                <td th:text="${v.usuario.username}"></td>
                <td th:text="${v.puntuacion} + ' ⭐'"></td>
                <td th:text="${v.comentario}"></td>
                <td th:text="${#temporals.format(v.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                <td>
                    <form th:action="'/web/admin/valoraciones/' + ${v.id} + '/eliminar'" method="post"
                          onsubmit="return confirm('¿Eliminar esta valoración?')">
                        <button class="btn btn-sm btn-danger">🗑 Eliminar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
