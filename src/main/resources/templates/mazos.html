<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mis Mazos — PokeApp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, Helvetica, sans-serif; background: #FFFDF5; min-height: 100vh; padding-bottom: 50px; }

        /* ── NAVBAR ── */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #E63946; padding: 14px 24px; box-shadow: 0 4px 0 #C62828;
        }
        .topbar-logo {
            display: flex; align-items: center; gap: 10px;
            color: white; font-size: 1.4rem; font-weight: bold;
            -webkit-text-stroke: 2px #1a1a1a; text-decoration: none;
        }
        .pokeball {
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid #1a1a1a; position: relative; overflow: hidden; flex-shrink: 0;
        }
        .pokeball::before { content:''; position:absolute; top:0; left:0; width:100%; height:50%; background:#E63946; }
        .pokeball::after  { content:''; position:absolute; bottom:0; left:0; width:100%; height:50%; background:white; }
        .pokeball-linea { position:absolute; top:50%; left:0; transform:translateY(-50%); width:100%; height:3px; background:#1a1a1a; z-index:1; }
        .pokeball .btn-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:12px; height:12px; background:white; border-radius:50%; border:3px solid #1a1a1a; z-index:2; }
        .back-btn {
            color:white; text-decoration:none; font-weight:bold;
            background:rgba(255,255,255,0.2); padding:8px 16px; border-radius:12px;
            font-size:0.9rem; transition:background 0.2s;
        }
        .back-btn:hover { background:rgba(255,255,255,0.35); }

        /* ── CONTENEDOR ── */
        .container { max-width: 1000px; margin: 32px auto; padding: 0 20px; }

        /* ── HERO ── */
        .hero {
            background: white; border-radius: 25px; padding: 28px;
            border: 3px solid #FDE68A; box-shadow: 0 6px 0 #FDE68A;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
        }
        .hero-texto h1 { font-size: 1.5rem; color: #333; margin-bottom: 4px; }
        .hero-texto p  { color: #AAA; font-size: 0.88rem; }
        .hero-stat { text-align: center; }
        .hero-stat-num   { font-size: 2.5rem; font-weight: 800; color: #E63946; line-height: 1; }
        .hero-stat-label { font-size: 0.78rem; color: #AAA; text-transform: uppercase; letter-spacing: 1px; }

        /* ── HEADER ACCIÓN ── */
        .seccion-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
        }
        .seccion-titulo { font-size: 1.05rem; font-weight: bold; color: #555; }
        .btn-nuevo-mazo {
            background: #BAE6FD; color: #0369A1; border: none;
            border-radius: 14px; padding: 11px 22px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #7DD3FC;
            transition: all 0.2s; font-size: 0.9rem;
        }
        .btn-nuevo-mazo:hover { transform: translateY(2px); box-shadow: 0 2px 0 #7DD3FC; }

        /* ── GRID MAZOS ── */
        .grid-mazos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* ── MAZO CARD ── */
        .mazo-card {
            background: white; border-radius: 22px; overflow: hidden;
            border: 3px solid #FF8A8A; box-shadow: 8px 8px 0 #FBCFE8;
            display: flex; flex-direction: column; transition: transform 0.2s;
        }
        .mazo-card:hover { transform: translateY(-5px); }
        .mazo-banner {
            height: 90px; display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; position: relative;
        }
        .mazo-banner-0 { background: linear-gradient(135deg,#FFDada,#FFB3B3); }
        .mazo-banner-1 { background: linear-gradient(135deg,#DaF5FF,#BAE6FD); }
        .mazo-banner-2 { background: linear-gradient(135deg,#DaFFda,#A7F3D0); }
        .mazo-banner-3 { background: linear-gradient(135deg,#FEFADA,#FDE68A); }
        .mazo-banner-4 { background: linear-gradient(135deg,#EADAFF,#D1D1FF); }
        .mazo-count-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(255,255,255,0.85); color: #555;
            padding: 3px 10px; border-radius: 50px; font-size: 0.72rem; font-weight: bold;
            border: 2px solid rgba(0,0,0,0.1);
        }
        .mazo-body { padding: 16px; flex: 1; }
        .mazo-nombre { font-weight: bold; font-size: 1.05rem; color: #333; margin-bottom: 4px; }
        .mazo-fecha  { font-size: 0.78rem; color: #AAA; margin-bottom: 10px; }
        .mazo-tipos  { display: flex; gap: 5px; flex-wrap: wrap; }
        .tipo-chip {
            background: #F0F0F0; color: #666;
            padding: 3px 10px; border-radius: 50px; font-size: 0.72rem; font-weight: bold;
        }
        .mazo-footer {
            padding: 12px 16px; border-top: 2px solid #FEE;
            display: flex; gap: 8px;
        }
        .btn-ver-mazo {
            flex: 1; background: #FF8A8A; color: white; border: none;
            border-radius: 12px; padding: 10px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #E57373; transition: all 0.2s;
            font-size: 0.88rem; text-decoration: none; text-align: center;
        }
        .btn-ver-mazo:hover { transform: translateY(2px); box-shadow: 0 2px 0 #E57373; }
        .btn-edit-mazo {
            background: #FFF9C4; color: #78650A; border: 2px solid #FDE68A;
            border-radius: 12px; padding: 10px 14px; font-weight: bold;
            cursor: pointer; font-size: 0.88rem; transition: 0.2s;
        }
        .btn-edit-mazo:hover { background: #FDE68A; }
        .btn-del-mazo {
            background: white; color: #E63946; border: 2px solid #FFB3B3;
            border-radius: 12px; padding: 10px 12px; cursor: pointer; font-size: 0.88rem;
            transition: 0.2s;
        }
        .btn-del-mazo:hover { background: #FEE2E2; }

        /* ── VACÍO ── */
        .estado-vacio { text-align: center; padding: 60px 20px; color: #CCC; }
        .estado-vacio .icono { font-size: 3rem; margin-bottom: 14px; }
        .estado-vacio h3 { color: #BBB; font-size: 1.05rem; margin-bottom: 8px; }

        /* ── OVERLAY / MODAL ── */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(3px);
        }
        .overlay.open { display: flex; }
        .modal {
            background: white; padding: 32px; border-radius: 28px;
            width: 90%; max-width: 420px; position: relative;
            border: 4px solid #FDE68A; box-shadow: 0 10px 0 #FDE68A;
            animation: fadeInUp 0.25s ease-out;
        }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:none;} }
        .modal h2 { font-size: 1.2rem; color: #333; margin-bottom: 18px; }
        .modal label { display: block; font-size: 0.85rem; color: #888; font-weight: bold; margin-bottom: 7px; }
        .modal input[type="text"] {
            width: 100%; padding: 12px 14px; border: 2px solid #EEE; border-radius: 12px;
            font-size: 0.95rem; outline: none; color: #333; transition: border-color 0.2s; margin-bottom: 4px;
        }
        .modal input[type="text"]:focus { border-color: #FF8A8A; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
        .btn-cancelar { background:#F0F0F0; color:#666; border:none; border-radius:12px; padding:10px 16px; font-weight:bold; cursor:pointer; }
        .btn-ok {
            background:#FF8A8A; color:white; border:none; border-radius:12px;
            padding:10px 20px; font-weight:bold; cursor:pointer;
            box-shadow:0 4px 0 #E57373; transition:all 0.2s;
        }
        .btn-ok:hover { transform:translateY(2px); box-shadow:0 2px 0 #E57373; }
        .cerrar { position:absolute; top:14px; right:14px; background:#F0F0F0; border:none; font-size:0.9rem; cursor:pointer; color:#888; border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; transition:0.2s; }
        .cerrar:hover { background:#FCA5A5; color:white; }

        /* ── TOAST ── */
        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:12px 28px; color:white; font-weight:bold; border-radius:50px; display:none; z-index:2000; font-size:0.9rem; }
        .toast.visible { display:block; }
        .toast.exito { background:#81C784; }
        .toast.error { background:#E57373; }
    </style>
</head>
<body>
<nav class="topbar">
    <a th:href="@{/web/home}" class="topbar-logo">
        <div class="pokeball">
            <div class="pokeball-linea"></div>
            <div class="btn-center"></div>
        </div>
        Mis Mazos
    </a>
    <a th:href="@{/web/home}" class="back-btn">← Volver</a>
</nav>

<div class="container">

    <div class="hero">
        <div class="hero-texto">
            <h1>🗂️ Mis Mazos TCG</h1>
            <p>Crea y gestiona tus mazos de cartas Pokémon</p>
        </div>
        <div class="hero-stat">
            <div class="hero-stat-num" id="statTotal">0</div>
            <div class="hero-stat-label">Mazos</div>
        </div>
    </div>

    <div class="seccion-header">
        <div class="seccion-titulo">Mis mazos</div>
        <button class="btn-nuevo-mazo" onclick="abrirModalCrear()">+ Nuevo Mazo</button>
    </div>

    <div class="grid-mazos" id="gridMazos">
        <div class="estado-vacio" style="grid-column:1/-1">
            <div class="icono">⏳</div>
            <h3>Cargando mazos...</h3>
        </div>
    </div>

</div>

<!-- Modal crear mazo -->
<div class="overlay" id="overlayCrear">
    <div class="modal" style="max-width: 500px;">
        <button class="cerrar" onclick="cerrar('overlayCrear')">✕</button>
        <h2>Nuevo Mazo</h2>
        
        <label>Nombre del mazo *</label>
        <input type="text" id="crearNombre" placeholder="Ej: Deck Fuego Inicial" maxlength="100">
        
        <label style="margin-top: 16px;">Buscar primera carta (opcional)</label>
        <div style="position: relative; margin-bottom: 12px;">
            <span style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 1rem;">🔍</span>
            <input type="text" id="inputBuscaMazo" placeholder="Escribe el nombre de la carta..." autocomplete="off" 
                   style="width: 100%; padding: 12px 16px 12px 42px; border: 2px solid #EEE; border-radius: 12px; font-size: 0.95rem; outline: none; color: #333; transition: border-color 0.2s; background: #FAFAFA;">
        </div>
        <div id="dropdownMazo" style="background: white; border: 2px solid #EEE; border-radius: 12px; max-height: 250px; overflow-y: auto; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-bottom: 12px;"></div>
        
        <div id="cartaSeleccionadaMazo" style="display: none; align-items: center; gap: 12px; background: #E1F5FE; border: 2px solid #7AACCF; border-radius: 12px; padding: 11px 16px; margin-bottom: 12px;">
            <span id="selEmojiMazo" style="font-size: 1.5rem;">🃏</span>
            <div style="flex: 1;">
                <div id="selNombreMazo" style="font-weight: bold; font-size: 0.9rem; color: #0369A1;">—</div>
                <div id="selRarezaMazo" style="font-size: 0.75rem; color: #7AACCF; margin-top: 2px;">—</div>
            </div>
            <button onclick="limpiarMazo()" style="background: none; border: none; cursor: pointer; color: #AAA; font-size: 1rem; transition: color 0.2s; padding: 4px;">✕</button>
        </div>
        
        <div class="modal-footer">
            <button class="btn-cancelar" onclick="cerrar('overlayCrear')">Cancelar</button>
            <button class="btn-ok" onclick="crearMazo()">✓ Crear</button>
        </div>
    </div>
</div>

<!-- Modal confirmar eliminar -->
<div class="overlay" id="overlayEliminar">
    <div class="modal">
        <button class="cerrar" onclick="cerrar('overlayEliminar')">✕</button>
        <h2>Eliminar Mazo</h2>
        <p style="color:#888;font-size:0.9rem;line-height:1.6">
            ¿Eliminar el mazo <strong id="eliminarNombre"></strong>?<br>Esta acción no se puede deshacer.
        </p>
        <div class="modal-footer">
            <button class="btn-cancelar" onclick="cerrar('overlayEliminar')">Cancelar</button>
            <button class="btn-ok" style="background:#E63946;box-shadow:0 4px 0 #C62828" onclick="confirmarEliminar()">🗑 Eliminar</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script th:inline="javascript">
    const USUARIO_ID = /*[[${usuarioId}]]*/ 1;
    const API = '/api/mazos';
    const EMOJIS  = ['🗂️','⚡','🔥','💧','🌿','🌙','🌟','🏆','🃏','💎'];
    const BANNERS = 5;
    let mazoAEliminar = null;

    async function cargarMazos() {
        try {
            const res = await fetch(`${API}/usuario/${USUARIO_ID}`);
            if (!res.ok) throw new Error();
            const mazos = await res.json();
            document.getElementById('statTotal').textContent = mazos.length;
            renderGrid(mazos);
        } catch {
            document.getElementById('gridMazos').innerHTML =
                '<div class="estado-vacio" style="grid-column:1/-1"><div class="icono">⚠️</div><h3>Error al cargar mazos</h3></div>';
        }
    }

    function renderGrid(mazos) {
        const grid = document.getElementById('gridMazos');
        if (!mazos.length) {
            grid.innerHTML = `<div class="estado-vacio" style="grid-column:1/-1">
                <div class="icono">🗂️</div>
                <h3>Aún no tienes mazos</h3>
                <p style="margin-top:8px">Crea tu primer mazo con el botón de arriba</p>
            </div>`;
            return;
        }
       grid.innerHTML = mazos.map((m, i) => `
    <div class="mazo-card" id="mazo-${m.id}">
        <div class="mazo-banner mazo-banner-${i % BANNERS}">
            ${EMOJIS[i % EMOJIS.length]}
            <span class="mazo-count-badge">${m.totalCartas || 0} cartas</span>
        </div>
        <div class="mazo-body">
            <div class="mazo-nombre">${m.nombre}</div>
            <div class="mazo-fecha">📅 ${m.fechaCreacion ? new Date(m.fechaCreacion).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) : 'Sin fecha'}</div>
        </div>
        <div class="mazo-footer">
            <a class="btn-ver-mazo" href="/web/mazos/${m.id}">Ver mazo</a>
            <button class="btn-edit-mazo" onclick="editarMazo(${m.id})">✏️</button>
            <button class="btn-del-mazo" onclick="pedirEliminar(${m.id}, '${esc(m.nombre)}')">🗑</button>
        </div>
    </div>
`).join('');
    }

    function abrirModalCrear() {
        document.getElementById('crearNombre').value = '';
        document.getElementById('overlayCrear').classList.add('open');
        setTimeout(() => document.getElementById('crearNombre').focus(), 100);
    }

    async function crearMazo() {
        const nombre = document.getElementById('crearNombre').value.trim();
        if (!nombre) return toast('El nombre es obligatorio', false);
        try {
            const res = await fetch(`${API}/${USUARIO_ID}?nombre=${encodeURIComponent(nombre)}`, { method:'POST' });
            if (res.ok) { mostrarToast('Mazo creado ✓','exito'); cerrar('overlayCrear'); cargarMazos(); }
            else { const e = await res.json().catch(()=>{}); mostrarToast(e?.mensaje || 'Error al crear','error'); }
        } catch { mostrarToast('Error de conexión','error'); }
    }

    function pedirEliminar(id, nombre) {
        mazoAEliminar = id;
        document.getElementById('eliminarNombre').textContent = `"${nombre}"`;
        document.getElementById('overlayEliminar').classList.add('open');
    }

    async function confirmarEliminar() {
        if (!mazoAEliminar) return;
        try {
            const res = await fetch(`${API}/${mazoAEliminar}`, { method:'DELETE' });
            if (res.ok) {
                mostrarToast('Mazo eliminado','exito'); cerrar('overlayEliminar');
                const el = document.getElementById('mazo-'+mazoAEliminar);
                if (el) { el.style.opacity='0'; el.style.transform='scale(0.9)'; el.style.transition='.3s'; }
                setTimeout(cargarMazos, 320);
            } else { mostrarToast('Error al eliminar','error'); }
        } catch { mostrarToast('Error de conexión','error'); }
    }

    function editarMazo(id) { window.location = `/web/mazos/${id}/editar`; }

    function cerrar(id) { document.getElementById(id).classList.remove('open'); }
    document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); }));

    function formatFecha(f) { if(!f) return '—'; return new Date(f).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}); }
    function esc(str) { return (str||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
    function mostrarToast(msg, tipo='exito') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = `toast ${tipo} visible`;
        setTimeout(() => t.classList.remove('visible'), 3000);
    }

    /* ── BÚSQUEDA DE CARTA EN MODAL CREAR MAZO ── */
    let cartaSeleccionadaMazoObj = null;
    let timerMazo = null;
    const inputMazo    = document.getElementById('inputBuscaMazo');
    const dropdownMazo = document.getElementById('dropdownMazo');

    inputMazo.addEventListener('input', () => {
        clearTimeout(timerMazo);
        const q = inputMazo.value.trim();
        if (q.length < 2) { dropdownMazo.style.display = 'none'; dropdownMazo.innerHTML = ''; return; }
        timerMazo = setTimeout(() => buscarParaMazo(q), 350);
    });

    document.addEventListener('click', e => {
        if (!inputMazo.contains(e.target) && !dropdownMazo.contains(e.target)) {
            dropdownMazo.style.display = 'none';
        }
    });

    async function buscarParaMazo(q) {
        dropdownMazo.innerHTML = '<div style="padding:12px 16px;color:#AAA;font-size:0.85rem;">Buscando...</div>';
        dropdownMazo.style.display = 'block';
        try {
            const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=name:${encodeURIComponent(q)}&pageSize=10`);
            const data = await res.json();
            const cartas = data.data || [];
            if (!cartas.length) {
                dropdownMazo.innerHTML = '<div style="padding:12px 16px;color:#AAA;font-size:0.85rem;">Sin resultados</div>';
                return;
            }
            dropdownMazo.innerHTML = cartas.map(c => {
                const img = c.images?.small || '';
                return `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;border-bottom:1px solid #F0F0F0;transition:background 0.15s;"
                             onmouseover="this.style.background='#F0F8FF'" onmouseout="this.style.background=''"
                             onclick="seleccionarParaMazo('${esc(c.id)}','${esc(c.name)}','${esc(c.rarity||'COMUN')}','${esc(c.set?.id||'')}','${esc(img)}')">
                    ${img
                        ? `<img src="${img}" alt="${c.name}" style="width:36px;height:50px;object-fit:contain;border-radius:5px;flex-shrink:0;" loading="lazy">`
                        : `<span style="font-size:1.4rem;width:36px;text-align:center;flex-shrink:0;">🃏</span>`}
                    <div>
                        <div style="font-weight:bold;font-size:0.88rem;color:#333;">${c.name}</div>
                        <div style="font-size:0.75rem;color:#AAA;margin-top:2px;">${c.rarity||''} · ${c.set?.name||''}</div>
                    </div>
                </div>`;
            }).join('');
        } catch {
            dropdownMazo.innerHTML = '<div style="padding:12px 16px;color:#E63946;font-size:0.85rem;">Error al buscar</div>';
        }
    }

    function seleccionarParaMazo(id, nombre, rareza, setCodigo, imagenUrl) {
        cartaSeleccionadaMazoObj = { id, nombre, rareza, setCodigo, imagenUrl };
        inputMazo.value = nombre;
        dropdownMazo.style.display = 'none';
        dropdownMazo.innerHTML = '';
        const emojiEl = document.getElementById('selEmojiMazo');
        if (imagenUrl) {
            emojiEl.outerHTML = `<img id="selEmojiMazo" src="${imagenUrl}" alt="${nombre}" style="width:44px;height:60px;object-fit:contain;border-radius:6px;flex-shrink:0;">`;
        } else {
            emojiEl.textContent = '🃏';
        }
        document.getElementById('selNombreMazo').textContent = nombre;
        document.getElementById('selRarezaMazo').textContent = rareza.replace('_', ' ');
        document.getElementById('cartaSeleccionadaMazo').style.display = 'flex';
    }

    function limpiarMazo() {
        cartaSeleccionadaMazoObj = null;
        inputMazo.value = '';
        dropdownMazo.style.display = 'none';
        const emojiEl = document.getElementById('selEmojiMazo');
        if (emojiEl.tagName === 'IMG') {
            emojiEl.outerHTML = `<span id="selEmojiMazo" style="font-size:1.5rem;">🃏</span>`;
        } else {
            emojiEl.textContent = '🃏';
        }
        document.getElementById('cartaSeleccionadaMazo').style.display = 'none';
    }

    cargarMazos();
</script>
</body>
</html>
