<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mis Ventas — PokeApp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, Helvetica, sans-serif; background: #FFFDF5; min-height: 100vh; padding-bottom: 50px; }

        /* ── NAVBAR ── */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #E63946; padding: 14px 24px; box-shadow: 0 4px 0 #C62828;
        }
        .topbar-logo {
            display: flex; align-items: center; gap: 10px;
            color: white; font-size: 1.3rem; font-weight: bold;
            -webkit-text-stroke: 2px #1a1a1a; text-decoration: none;
        }
        .pokeball {
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid #1a1a1a; position: relative; overflow: hidden; flex-shrink: 0;
        }
        .pokeball::before { content:''; position:absolute; top:0; left:0; width:100%; height:50%; background:#E63946; }
        .pokeball::after  { content:''; position:absolute; bottom:0; left:0; width:100%; height:50%; background:white; }
        .pokeball-linea { position:absolute; top:50%; left:0; transform:translateY(-50%); width:100%; height:3px; background:#1a1a1a; z-index:1; }
        .pokeball .btn-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:12px; height:12px; background:white; border-radius:50%; border:3px solid #1a1a1a; z-index:2; }
        .nav-links { display:flex; gap:8px; align-items:center; }
        .nav-links a {
            color:white; text-decoration:none; font-weight:bold; font-size:0.88rem;
            background:rgba(0,0,0,0.1); padding:8px 14px; border-radius:10px; transition:0.2s;
        }
        .nav-links a:hover { background:rgba(0,0,0,0.22); }

        /* ── TABS ── */
        .tabs {
            display: flex; justify-content: center; gap: 8px;
            background: white; padding: 12px 20px; border-bottom: 4px solid #EEE;
        }
        .tab {
            padding: 10px 22px; cursor: pointer; border-radius: 12px 12px 0 0;
            color: #AAA; font-weight: bold; font-size: 0.9rem;
            transition: 0.2s; text-decoration: none; border: 3px solid transparent;
        }
        .tab.activo {
            color: #E63946; background: #FFFDF5;
            border: 3px solid #EEE; border-bottom: 3px solid #FFFDF5;
            margin-bottom: -4px; z-index: 2;
        }
        .tab:hover:not(.activo) { color: #666; background: #F5F5F5; }

        /* ── CONTENEDOR ── */
        .container { max-width: 1100px; margin: 28px auto; padding: 0 20px; }

        /* ── STATS ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 28px;
        }
        .stat-card {
            background: white; border-radius: 20px; padding: 20px;
            border: 3px solid #EEE; box-shadow: 0 5px 0 #F0F0F0; text-align: center;
        }
        .stat-number { font-size: 2rem; font-weight: bold; display: block; color: #333; margin-bottom: 4px; }
        .stat-number.ganado  { color: #2E7D32; }
        .stat-number.activas { color: #1E88E5; }
        .stat-label { color: #AAA; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; }

        /* ── HEADER ACCIÓN ── */
        .seccion-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
        }
        .seccion-titulo { font-size: 1.05rem; font-weight: bold; color: #555; }
        .btn-nueva-venta {
            background: #FF8A8A; color: white; border: none;
            border-radius: 14px; padding: 10px 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #E57373;
            transition: all 0.2s; font-size: 0.9rem; text-decoration: none;
            display: inline-block;
        }
        .btn-nueva-venta:hover { transform: translateY(2px); box-shadow: 0 2px 0 #E57373; }

        /* ── TABLA ── */
        .tabla-card {
            background: white; border-radius: 22px;
            border: 3px solid #FFB3B3; box-shadow: 0 6px 0 #FFD1D1; overflow: hidden;
        }
        .fila-venta {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1fr 1fr 1fr 1fr;
            padding: 16px 20px; border-bottom: 2px solid #F8F8F8;
            align-items: center; transition: background 0.15s;
        }
        .fila-venta:last-child { border-bottom: none; }
        .fila-venta:hover:not(.fila-header) { background: #FFF5F5; }
        .fila-header {
            background: #FFF0F0; font-weight: bold; color: #E63946;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px;
        }
        .carta-info { display: flex; align-items: center; gap: 12px; }
        .carta-avatar {
            font-size: 1.3rem; background: #F5F5F5;
            width: 42px; height: 42px; display: flex; align-items: center;
            justify-content: center; border-radius: 12px; flex-shrink: 0;
        }
        .carta-nombre { font-weight: bold; font-size: 0.9rem; color: #333; }
        .carta-fecha  { font-size: 0.78rem; color: #BBB; margin-top: 2px; }
        .comprador-nombre { font-weight: bold; font-size: 0.88rem; color: #333; }
        .comprador-id     { font-size: 0.75rem; color: #CCC; margin-top: 1px; }

        .badge {
            display: inline-block; padding: 5px 11px; border-radius: 50px;
            font-size: 0.72rem; font-weight: bold; text-transform: uppercase;
        }
        .tipo-TRUEQUE { background: #F3E5F5; color: #8E24AA; }
        .tipo-VENTA   { background: #E3F2FD; color: #1E88E5; }
        .estado-PENDIENTE  { background: #FFF3E0; color: #EF6C00; }
        .estado-COMPLETADA { background: #E8F5E9; color: #2E7D32; }
        .estado-ACTIVA     { background: #E3F2FD; color: #1565C0; }
        .estado-CANCELADA  { background: #FAFAFA; color: #999; }

        .precio-venta { font-weight: bold; color: #E63946; }
        .precio-venta.trueque { color: #8E24AA; }

        .btn-accion {
            border: 2px solid #EEE; background: white;
            border-radius: 10px; padding: 6px 10px; cursor: pointer;
            font-size: 0.85rem; transition: 0.2s;
        }
        .btn-accion:hover { border-color: #FF8A8A; background: #FFF5F5; }
        .btn-accion.completar { border-color: #B3E5BE; color: #2E7D32; }
        .btn-accion.completar:hover { background: #E8F5E9; }
        .btn-accion.cancelar { border-color: #FFB3B3; color: #E63946; }
        .btn-accion.cancelar:hover { background: #FFF0F0; }

        /* ── VACÍO ── */
        .estado-vacio { text-align: center; padding: 50px; color: #CCC; }
        .estado-vacio .icono { font-size: 2.5rem; margin-bottom: 12px; }
        .estado-vacio h3 { color: #BBB; font-size: 1rem; margin-bottom: 6px; }
        .estado-vacio a { color: #FF8A8A; }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            padding: 12px 28px; color: white; font-weight: bold; border-radius: 50px;
            display: none; z-index: 2000; font-size: 0.9rem;
        }
        .toast.visible { display: block; }
        .toast.exito { background: #81C784; }
        .toast.error { background: #E57373; }
    </style>
</head>
<body>
<nav class="topbar">
    <a th:href="@{/web/home}" class="topbar-logo">
        <div class="pokeball">
            <div class="pokeball-linea"></div>
            <div class="btn-center"></div>
        </div>
        Mis Ventas
    </a>
    <div class="nav-links">
        <a th:href="@{/web/home}">Inicio</a>
        <a th:href="@{/web/mercado}">Mercado</a>
        <a th:href="@{/web/mercado/mis-compras}">Mis Compras</a>
        <a th:href="@{/web/logout}">Salir</a>
    </div>
</nav>

<div class="tabs">
    <a class="tab activo" th:href="@{/web/mercado/mis-ventas}">Mis Ventas</a>
    <a class="tab" th:href="@{/web/mercado/mis-compras}">Mis Compras</a>
    <a class="tab" th:href="@{/web/valoraciones}">Valoraciones</a>
</div>

<div class="container">
    <div class="stats-row">
        <div class="stat-card">
            <span class="stat-number" id="statTotal">0</span>
            <div class="stat-label">Ventas totales</div>
        </div>
        <div class="stat-card">
            <span class="stat-number ganado" id="statGanado">€0</span>
            <div class="stat-label">Total ganado</div>
        </div>
        <div class="stat-card">
            <span class="stat-number activas" id="statActivas">0</span>
            <div class="stat-label">Anuncios activos</div>
        </div>
    </div>

    <div class="seccion-header">
        <div class="seccion-titulo">Mis anuncios</div>
        <a th:href="@{/web/venta/nueva}" class="btn-nueva-venta">+ Nueva venta</a>
    </div>

    <div class="tabla-card">
        <div class="fila-venta fila-header">
            <div>Carta</div>
            <div>Comprador</div>
            <div>Tipo</div>
            <div>Precio</div>
            <div>Estado</div>
            <div>Acciones</div>
        </div>
        <div id="listaVentas">
            <div class="estado-vacio">
                <div class="icono">⏳</div>
                <h3>Cargando...</h3>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script th:inline="javascript">
    const USUARIO_ID  = /*[[${usuarioId}]]*/ 1;
    const API_MERCADO = '/api/mercado';

    const RAREZA_EMOJI = { COMUN:'⚪', POCO_COMUN:'🟢', RARA:'🔵', ULTRA_RARA:'🟡', SECRETA:'🟣', RAINBOW:'🌈' };

    async function cargarVentas() {
        try {
            const res = await fetch(`${API_MERCADO}/usuario/${USUARIO_ID}`);
            const ventas = await res.json();
            renderVentas(ventas);
        } catch {
            document.getElementById('listaVentas').innerHTML =
                '<div class="estado-vacio"><div class="icono">⚠️</div><h3>Error al cargar</h3></div>';
        }
    }

    function renderVentas(ventas) {
        const lista = document.getElementById('listaVentas');
        if (!ventas.length) {
            lista.innerHTML = `<div class="estado-vacio"><div class="icono">📦</div><h3>Aún no tienes anuncios</h3><p>¡<a href="/web/venta/nueva">Crea tu primera venta</a> en el mercado!</p></div>`;
            document.getElementById('statTotal').textContent   = 0;
            document.getElementById('statGanado').textContent  = '€0';
            document.getElementById('statActivas').textContent = 0;
            return;
        }

        const completadas = ventas.filter(v => v.estado === 'COMPLETADA');
        const ganado = completadas.filter(v => v.precio).reduce((a,v) => a + parseFloat(v.precio), 0);
        document.getElementById('statTotal').textContent   = ventas.length;
        document.getElementById('statGanado').textContent  = `€${ganado.toFixed(2)}`;
        document.getElementById('statActivas').textContent = ventas.filter(v => v.estado === 'ACTIVA').length;

        lista.innerHTML = ventas.map(v => {
            const fecha    = v.fecha ? new Date(v.fecha).toLocaleDateString('es-ES') : '—';
            const esTrueque= v.tipo === 'TRUEQUE';
            const esActiva = v.estado === 'ACTIVA';
            return `
            <div class="fila-venta">
                <div class="carta-info">
                    <div class="carta-avatar">${RAREZA_EMOJI[v.cartaRareza] || '🃏'}</div>
                    <div>
                        <div class="carta-nombre">${v.cartaNombre || 'Carta #'+v.cartaId}</div>
                        <div class="carta-fecha">${fecha}</div>
                    </div>
                </div>
                <div>
                    ${v.compradorNombre
                        ? `<div class="comprador-nombre">${v.compradorNombre}</div><div class="comprador-id">ID: ${v.compradorId}</div>`
                        : '<span style="color:#CCC;font-size:0.85rem">Sin comprador</span>'}
                </div>
                <div><span class="badge tipo-${v.tipo}">${v.tipo}</span></div>
                <div class="precio-venta ${esTrueque?'trueque':''}">${esTrueque ? '🔄 Trueque' : (v.precio ? '€'+parseFloat(v.precio).toFixed(2) : '—')}</div>
                <div><span class="badge estado-${v.estado}">${v.estado}</span></div>
                <div style="display:flex;gap:5px;flex-wrap:wrap">
                    ${esActiva ? `
                        <button class="btn-accion completar" onclick="cambiarEstado(${v.id},'COMPLETADA')">✔</button>
                        <button class="btn-accion cancelar"  onclick="cambiarEstado(${v.id},'CANCELADA')">✘</button>
                    ` : '—'}
                </div>
            </div>`;
        }).join('');
    }

    async function cambiarEstado(ventaId, nuevoEstado) {
        try {
            const res = await fetch(`${API_MERCADO}/${ventaId}/estado`, {
                method:'PATCH', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ estado: nuevoEstado })
            });
            if (res.ok) { mostrarToast('Estado actualizado ✓','exito'); cargarVentas(); }
            else { const e = await res.text(); mostrarToast('Error: '+e,'error'); }
        } catch { mostrarToast('Error de red','error'); }
    }

    function mostrarToast(msg, tipo='exito') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = `toast ${tipo} visible`;
        setTimeout(() => t.classList.remove('visible'), 3000);
    }

    cargarVentas();
</script>
</body>
</html>
