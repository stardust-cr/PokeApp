<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
    <title>Registro de Usuario</title>
    <style>
        * {
        box-sizing: border-box;
        margin:0;
        padding: 0;
        }
        body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #FFFDF5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
        }

        .card-registro {
        width: 100%;
        max-width: 400px;
        background-color: white;
        border-radius: 30px;
        box-shadow: 0 10px 0 #D4EDDA;
        padding: 40px;
        border: 5px solid #B3E5BE;
        }

        h2{
        text-align: center;
        color: #4A7A54;
        margin-bottom: 25px;
        font-size:1.8rem;
        letter-spacing: -1px;
        }

        .form-group {
        margin-bottom: 18px;
        }

        label {
        display: block;
        margin-bottom: 8px;
        margin-left: 5px;
        color: #888;
        font-weight: bold;
        font-size: 0.9rem;
        }

        .form-control {
        width: 100%;
        padding: 12px 16px;
        border: 3px solid #E3F2FD;
        border-radius: 15px;
        font-size: 1rem;
        color:#333;
        outline: none;
        transition: 0.3s;
        background: #F8FDFF;
        }

        .form-control:focus {
        border-color: #B3E5FF;
        box-shadow: 0 0 0 4px #E1F5FE;
        background-color: white;
        }

        .btn-crear {
        width: 100%;
        padding: 15px;
        background-color: #FFB3D9;
        color: #A04070;
        border: none;
        border-radius: 20px;
        font-size: 1.1rem;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 6px 0 #FF99CC;
        transition: all 0.2s;
        margin-top: 10px;
        text-transform: uppercase;
        }
        .btn-crear:hover {
        filter: brightness(1.05);
        box-shadow: 0 8px 0 #FF99CC;
        transform: translateY(-2px);
        }

        .btn-crear:active {
        box-shadow: 0 2px 0 #FF99CC;
        transform: translateY(4px);
        }

        .footer-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #888;
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
        }

        .footer-link:hover {
        color: #FFB3D9;
        }

        input[type="file"] {
        padding: 10px;
        background: #FFF9C4; /* Amarillo pastel */
        border: 3px dashed #FBC02D;
        cursor: pointer;
        }


    </style>
</head>
<body>

<div class="card-registro">
        <h2>Crear Entrenador</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}">
            El nombre de usuario ya existe
        </div>

        <form th:action="@{/web/register}" method="post">
            
            <div class="form-group">
                <label>Nombre de Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Ej: Red" required />
            </div>

            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" class="form-control" placeholder="entrenador@poke.com" required />
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required />
            </div>


            <button type="submit" class="btn-crear">
                ¡Registrarse!
            </button>
        </form>

        <a th:href="@{/web/login}" class="footer-link">¿Ya tienes cuenta? Inicia sesión aquí</a>
    </div>

</body>
</html>
