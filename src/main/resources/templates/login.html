<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PokeApp — Iniciar Sesión</title>
    <style>
        :root {
            --rojo: #E63946;
            --rojo-claro: #FF8A8A;
            --rojo-sombra: #E57373;
            --amarillo: #FDE68A;
            --azul-claro: #BAE6FD;
            --azul-sombra: #7DD3FC;
            --azul-texto: #0369A1;
            --fondo: #FFFDF5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: var(--fondo);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 0px var(--amarillo);
            border: 4px solid var(--rojo-claro);
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: fadeInUp 0.5s ease-out;
        }
        .login-header { margin-bottom: 28px; }
        .pokeball-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .login-header h2 {
            font-size: 1.6rem;
            color: #1a1a1a;
            margin-bottom: 4px;
        }
        .login-header p {
            color: #888;
            font-size: 0.95rem;
        }
        .alert {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.88rem;
            margin-bottom: 16px;
            text-align: left;
        }
        .alert-danger {
            background: rgba(255,107,107,0.15);
            color: #FF6B6B;
            border-left: 4px solid #FF6B6B;
        }
        .alert-success {
            background: rgba(78,205,196,0.15);
            color: #4ECDC4;
            border-left: 4px solid #4ECDC4;
        }
        .form-group { margin-bottom: 18px; text-align: left; }
        .form-label {
            display: block;
            font-weight: 600;
            font-size: 0.88rem;
            color: #555;
            margin-bottom: 8px;
            margin-left: 4px;
        }
        .form-control {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #EEE;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #333;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #FAFAFA;
        }
        .form-control:focus {
            border-color: var(--rojo-claro);
            box-shadow: 0 0 0 3px rgba(255,138,138,0.15);
            background: white;
        }
        .form-control::placeholder { color: #BBB; }
        hr {
            border: none;
            border-top: 2px solid #F0F0F0;
            margin: 20px 0;
        }
        .btn {
            display: block;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 14px;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
        }
        .btn-iniciar {
            background-color: var(--rojo-claro);
            color: white;
            box-shadow: 0 4px 0px var(--rojo-sombra);
        }
        .btn-iniciar:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--rojo-sombra);
        }
        .btn-register {
            background: var(--azul-claro);
            color: var(--azul-texto);
            box-shadow: 0 4px 0 var(--azul-sombra);
            margin-top: 10px;
        }
        .btn-register:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--azul-sombra);
        }
        .footer-hint {
            color: #999;
            font-size: 0.88rem;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <div class="pokeball-icon">🎮</div>
        <h2>PokeApp</h2>
        <p>Bienvenida/o de vuelta</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Usuario o contraseña incorrectos
    </div>
    <div th:if="${param.logout}" class="alert alert-success">
        Sesión cerrada correctamente
    </div>
    <div th:if="${param.signup}" class="alert alert-success">
        ¡Registro exitoso! Ya puedes iniciar sesión
    </div>

    <form th:action="@{/web/login}" method="post">
        <div class="form-group">
            <label class="form-label">Usuario</label>
<input type="text" name="username" class="form-control" placeholder="Tu nombre de usuario" required autofocus/>

        </div>
        <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required/>
        </div>
        <button type="submit" class="btn btn-iniciar">Iniciar Sesión</button>
    </form>

    <hr/>

    <p class="footer-hint">¿Primera vez?</p>
    <a th:href="@{/web/register}" class="btn btn-register">Crear cuenta</a>
</div>
</body>
</html>
