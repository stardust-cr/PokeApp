<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Nueva Venta — PokeApp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #FFFDF5; min-height: 100vh; padding-bottom: 50px;
        }

        /* ── NAVBAR ── */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #E63946; padding: 14px 24px; box-shadow: 0 4px 0 #C62828;
        }
        .topbar-logo {
            display: flex; align-items: center; gap: 10px;
            color: white; font-size: 1.3rem; font-weight: bold;
            -webkit-text-stroke: 2px #1a1a1a; text-decoration: none;
        }
        .pokeball {
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid #1a1a1a; position: relative; overflow: hidden; flex-shrink: 0;
        }
        .pokeball::before { content:''; position:absolute; top:0; left:0; width:100%; height:50%; background:#E63946; }
        .pokeball::after  { content:''; position:absolute; bottom:0; left:0; width:100%; height:50%; background:white; }
        .pokeball-linea { position:absolute; top:50%; left:0; transform:translateY(-50%); width:100%; height:3px; background:#1a1a1a; z-index:1; }
        .pokeball .btn-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:12px; height:12px; background:white; border-radius:50%; border:3px solid #1a1a1a; z-index:2; }
        .back-btn {
            color:white; text-decoration:none; font-weight:bold;
            background:rgba(255,255,255,0.2); padding:8px 16px; border-radius:12px;
            font-size:0.9rem; transition:background 0.2s;
        }
        .back-btn:hover { background:rgba(255,255,255,0.35); }

        /* ── CONTENEDOR ── */
        .container { max-width: 600px; margin: 36px auto; padding: 0 20px; }

        /* ── FORM CARD ── */
        .form-card {
            background: white; border-radius: 28px;
            border: 4px solid #FFB3B3; box-shadow: 0 10px 0 #FFD1D1;
            padding: 36px;
            animation: fadeInUp 0.4s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: none; }
        }
        .form-title {
            font-size: 1.4rem; font-weight: bold; color: #333;
            margin-bottom: 6px;
        }
        .form-subtitle { color: #AAA; font-size: 0.88rem; margin-bottom: 28px; }

        /* ── CAMPOS ── */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 0.85rem; color: #888;
            font-weight: bold; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%; padding: 13px 16px; border: 2px solid #EEE;
            border-radius: 14px; font-size: 0.95rem; color: #333;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            background: #FAFAFA; font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #FF8A8A; background: white;
            box-shadow: 0 0 0 4px rgba(255,138,138,0.12);
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder { color: #CCC; }
        .form-group textarea { height: 90px; resize: none; }

        /* ── TIPO TOGGLE ── */
        .tipo-toggle { display: flex; gap: 10px; }
        .tipo-btn {
            flex: 1; padding: 13px; border-radius: 14px; border: 2px solid #EEE;
            cursor: pointer; font-weight: bold; font-size: 0.9rem;
            text-align: center; background: white; color: #888; transition: all 0.2s;
        }
        .tipo-btn.activo.venta   { background: #E3F2FD; color: #1E88E5; border-color: #B3D4F5; }
        .tipo-btn.activo.trueque { background: #F3E5F5; color: #8E24AA; border-color: #CE93D8; }

        /* ── PRECIO CONDICIONAL ── */
        #grupoPrecio { transition: opacity 0.3s; }
        #grupoPrecio.oculto { opacity: 0.3; pointer-events: none; }

        /* ── ALERTA ── */
        .alert {
            border-radius: 12px; padding: 12px 16px; font-size: 0.88rem;
            margin-bottom: 16px;
        }
        .alert-danger { background: rgba(255,107,107,0.15); color: #C62828; border-left: 4px solid #F87171; }
        .alert-success{ background: rgba(78,205,196,0.15);  color: #0E7490; border-left: 4px solid #4ECDC4; }

        /* ── BOTONES ── */
        .form-footer { display: flex; gap: 12px; margin-top: 10px; }
        .btn-publicar {
            flex: 1; padding: 15px; background: #FF8A8A; color: white;
            border: none; border-radius: 16px; font-size: 1rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 0 #E57373; transition: all 0.2s;
        }
        .btn-publicar:hover { transform: translateY(2px); box-shadow: 0 3px 0 #E57373; }
        .btn-publicar:active{ transform: translateY(5px); box-shadow: 0 1px 0 #E57373; }
        .btn-cancelar {
            padding: 15px 22px; background: #F0F0F0; color: #666;
            border: none; border-radius: 16px; font-size: 0.95rem; font-weight: bold;
            cursor: pointer; transition: background 0.2s; text-decoration: none;
            display: flex; align-items: center;
        }
        .btn-cancelar:hover { background: #E0E0E0; }

        /* ── PREVIEW CARTA ── */
        .carta-preview {
            background: linear-gradient(135deg, #FFF9C4, #FDE68A);
            border-radius: 18px; padding: 20px; text-align: center;
            border: 3px solid #FDE68A; margin-bottom: 20px; display: none;
        }
        .carta-preview .emoji { font-size: 2.5rem; display: block; margin-bottom: 8px; }
        .carta-preview .nombre { font-weight: bold; font-size: 1rem; color: #333; }
        .carta-preview .rareza { font-size: 0.8rem; color: #888; margin-top: 3px; }
    </style>
</head>
<body>
<nav class="topbar">
    <a th:href="@{/web/mercado}" class="topbar-logo">
        <div class="pokeball">
            <div class="pokeball-linea"></div>
            <div class="btn-center"></div>
        </div>
        Nueva Venta
    </a>
    <a th:href="@{/web/mercado}" class="back-btn">← Volver al mercado</a>
</nav>

<div class="container">
    <div class="form-card">
        <div class="form-title">📦 Poner carta en venta</div>
        <div class="form-subtitle">Completa los datos de tu anuncio</div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

        <form th:action="@{/web/venta/crear}" method="post" id="formVenta">
            <input type="hidden" name="vendedorId" th:value="${usuarioId}"/>

            <div class="form-group">
                <label>Carta a vender</label>
                <select name="cartaId" id="cartaSelect" required onchange="actualizarPreview()">
                    <option value="" disabled selected>-- Selecciona una carta de tu colección --</option>
                    <option th:each="carta : ${misCartas}"
                            th:value="${carta.id}"
                            th:text="${carta.nombre + ' (' + carta.rareza + ')'}"
                            th:data-rareza="${carta.rareza}"
                            th:data-nombre="${carta.nombre}">
                    </option>
                </select>
            </div>

            <!-- Preview carta seleccionada -->
            <div class="carta-preview" id="cartaPreview">
                <span class="emoji" id="previewEmoji">🃏</span>
                <div class="nombre" id="previewNombre">—</div>
                <div class="rareza" id="previewRareza">—</div>
            </div>

            <div class="form-group">
                <label>Tipo de anuncio</label>
                <div class="tipo-toggle">
                    <div class="tipo-btn activo venta" onclick="setTipo('VENTA')">🛒 Venta</div>
                    <div class="tipo-btn trueque"       onclick="setTipo('TRUEQUE')">🔄 Trueque</div>
                </div>
                <input type="hidden" name="tipo" id="tipoInput" value="VENTA">
            </div>

            <div class="form-group" id="grupoPrecio">
                <label>Precio (€)</label>
                <input type="number" name="precio" id="precioInput"
                       placeholder="Ej: 4.99" min="0" step="0.01">
            </div>

            <div class="form-group">
                <label>Descripción <span style="color:#CCC;font-weight:normal;font-size:0.8rem">(opcional)</span></label>
                <textarea name="descripcion" placeholder="Estado de la carta, condición, extras..."></textarea>
            </div>

            <div class="form-footer">
                <a th:href="@{/web/mercado}" class="btn-cancelar">Cancelar</a>
                <button type="submit" class="btn-publicar">🚀 Publicar anuncio</button>
            </div>
        </form>
    </div>
</div>

<script>
    const RAREZA_EMOJI = { COMUN:'⚪', POCO_COMUN:'🟢', RARA:'🔵', ULTRA_RARA:'🟡', SECRETA:'🟣', RAINBOW:'🌈' };

    function setTipo(tipo) {
        document.getElementById('tipoInput').value = tipo;
        document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('activo'));
        const btn = tipo === 'VENTA'
            ? document.querySelector('.tipo-btn.venta')
            : document.querySelector('.tipo-btn.trueque');
        btn.classList.add('activo');
        document.getElementById('grupoPrecio').classList.toggle('oculto', tipo === 'TRUEQUE');
        if (tipo === 'TRUEQUE') document.getElementById('precioInput').value = '';
    }

    function actualizarPreview() {
        const sel = document.getElementById('cartaSelect');
        const opt = sel.options[sel.selectedIndex];
        if (!opt.value) { document.getElementById('cartaPreview').style.display = 'none'; return; }
        const rareza = opt.getAttribute('data-rareza') || 'COMUN';
        const nombre = opt.getAttribute('data-nombre') || opt.text;
        document.getElementById('previewEmoji').textContent  = RAREZA_EMOJI[rareza] || '🃏';
        document.getElementById('previewNombre').textContent = nombre;
        document.getElementById('previewRareza').textContent = rareza.replace('_',' ');
        document.getElementById('cartaPreview').style.display = 'block';
    }
</script>
</body>
</html>
