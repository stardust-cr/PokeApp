<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Mazo — PokeApp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, Helvetica, sans-serif; background: #FFFDF5; min-height: 100vh; padding-bottom: 50px; }

        .topbar { display:flex; justify-content:space-between; align-items:center; background-color:#E63946; padding:14px 24px; box-shadow:0 4px 0 #C62828; }
        .topbar-logo { display:flex; align-items:center; gap:10px; color:white; font-size:1.4rem; font-weight:bold; -webkit-text-stroke:2px #1a1a1a; text-decoration:none; }
        .pokeball { width:36px; height:36px; border-radius:50%; border:3px solid #1a1a1a; position:relative; overflow:hidden; flex-shrink:0; }
        .pokeball::before { content:''; position:absolute; top:0; left:0; width:100%; height:50%; background:#E63946; }
        .pokeball::after  { content:''; position:absolute; bottom:0; left:0; width:100%; height:50%; background:white; }
        .pokeball-linea { position:absolute; top:50%; left:0; transform:translateY(-50%); width:100%; height:3px; background:#1a1a1a; z-index:1; }
        .pokeball .btn-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:12px; height:12px; background:white; border-radius:50%; border:3px solid #1a1a1a; z-index:2; }
        .back-btn { color:white; text-decoration:none; font-weight:bold; background:rgba(255,255,255,0.2); padding:8px 16px; border-radius:12px; font-size:0.9rem; transition:background 0.2s; }
        .back-btn:hover { background:rgba(255,255,255,0.35); }

        .container { max-width: 700px; margin: 32px auto; padding: 0 20px; }

        /* SECCIÓN */
        .seccion {
            background: white; border-radius: 22px; padding: 26px 28px;
            margin-bottom: 22px; border: 3px solid #FDE68A; box-shadow: 0 5px 0 #FDE68A;
        }
        .seccion h2 { font-size: 1.05rem; color: #555; margin-bottom: 20px; display:flex; align-items:center; gap:8px; }

        label { display:block; font-size:0.82rem; color:#888; font-weight:bold; margin-bottom:7px; text-transform:uppercase; letter-spacing:0.5px; }
        input[type="text"], textarea {
            width:100%; padding:12px 14px; border:2px solid #EEE; border-radius:12px;
            font-size:0.95rem; color:#333; outline:none; transition:border-color 0.2s;
            background:#FAFAFA; margin-bottom:18px; font-family:inherit;
        }
        input[type="text"]:focus, textarea:focus { border-color:#FDE68A; background:white; }
        textarea { resize:vertical; min-height:80px; }

        /* Toggle público */
        .toggle-row { display:flex; justify-content:space-between; align-items:center; padding:14px 0; border-top:2px solid #F5F5F5; }
        .toggle-label { font-size:0.92rem; color:#444; }
        .toggle-sub { font-size:0.78rem; color:#AAA; margin-top:2px; }
        .toggle { position:relative; display:inline-block; width:46px; height:26px; }
        .toggle input { opacity:0; width:0; height:0; }
        .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#DDD; border-radius:34px; transition:.3s; }
        .slider:before { position:absolute; content:""; height:20px; width:20px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.3s; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
        input:checked + .slider { background:#4CAF50; }
        input:checked + .slider:before { transform:translateX(20px); }

        /* Botones */
        .btn-guardar {
            background:#FDE68A; color:#78650A; border:none; border-radius:14px;
            padding:13px 28px; font-weight:bold; cursor:pointer;
            box-shadow:0 4px 0 #F6D200; transition:all 0.2s; font-size:0.95rem; width:100%;
        }
        .btn-guardar:hover { transform:translateY(2px); box-shadow:0 2px 0 #F6D200; }
        .btn-guardar:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

        /* Cartas */
        .grid-cartas { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:14px; margin-top:16px; }
        .carta-card { background:white; border-radius:16px; overflow:hidden; border:2px solid #FFB3D9; box-shadow:0 4px 0 #FFD1E8; }
        .carta-img { width:100%; height:130px; object-fit:contain; background:#fafafa; display:block; }
        .carta-body { padding:10px 12px; }
        .carta-nombre { font-weight:bold; font-size:0.82rem; color:#333; margin-bottom:2px; }
        .carta-qty { font-size:0.75rem; color:#AAA; }
        .btn-quitar-carta { width:100%; background:white; color:#E63946; border:2px solid #FFB3B3; border-radius:0 0 14px 14px; padding:7px; cursor:pointer; font-size:0.8rem; font-weight:bold; transition:0.2s; }
        .btn-quitar-carta:hover { background:#FEE2E2; }

        .estado-vacio { text-align:center; padding:30px; color:#CCC; }

        /* Añadir carta */
        .add-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:12px; }
        .search-wrap { position:relative; flex:1; min-width:200px; }
        .search-wrap input { width:100%; padding:11px 14px 11px 38px; border:2px solid #EEE; border-radius:12px; font-size:0.9rem; color:#333; outline:none; transition:border-color 0.2s; background:#FAFAFA; margin-bottom:0; }
        .search-wrap input:focus { border-color:#BAE6FD; background:white; }
        .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:0.95rem; pointer-events:none; }
        .dropdown { position:absolute; top:calc(100% + 4px); left:0; right:0; background:white; border:2px solid #EEE; border-radius:12px; max-height:200px; overflow-y:auto; display:none; box-shadow:0 8px 20px rgba(0,0,0,0.08); z-index:50; }
        .dropdown.open { display:block; }
        .drop-item { display:flex; align-items:center; gap:10px; padding:10px 14px; cursor:pointer; border-bottom:1px solid #F8F8F8; transition:background 0.15s; }
        .drop-item:last-child { border-bottom:none; }
        .drop-item:hover { background:#F0F8FF; }
        .drop-img { width:30px; height:42px; object-fit:contain; border-radius:4px; flex-shrink:0; }
        .drop-nombre { font-weight:bold; font-size:0.85rem; color:#333; }
        .drop-sub { font-size:0.72rem; color:#AAA; }
        .drop-msg { padding:12px; text-align:center; color:#AAA; font-size:0.82rem; }
        .btn-add { background:#BAE6FD; color:#0369A1; border:none; border-radius:12px; padding:11px 18px; font-weight:bold; cursor:pointer; box-shadow:0 4px 0 #7DD3FC; transition:all 0.2s; white-space:nowrap; }
        .btn-add:hover { transform:translateY(2px); box-shadow:0 2px 0 #7DD3FC; }
        input[type="number"] { width:70px; padding:10px 12px; border:2px solid #EEE; border-radius:12px; font-size:0.9rem; outline:none; text-align:center; margin-bottom:0; }

        /* Toast */
        .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); padding:12px 28px; color:white; font-weight:bold; border-radius:50px; display:none; z-index:2000; font-size:0.9rem; }
        .toast.visible { display:block; }
        .toast.exito { background:#81C784; }
        .toast.error { background:#E57373; }
    </style>
</head>
<body>
<nav class="topbar">
    <a th:href="@{/web/mazos}" class="topbar-logo">
        <div class="pokeball"><div class="pokeball-linea"></div><div class="btn-center"></div></div>
        Editar Mazo
    </a>
    <a th:href="|/web/mazos/${mazoId}|" class="back-btn">← Ver mazo</a>
</nav>

<div class="container">

    <!-- INFO DEL MAZO -->
    <div class="seccion">
        <h2>✏️ Información del mazo</h2>

        <label>Nombre *</label>
        <input type="text" id="inpNombre" placeholder="Nombre del mazo" maxlength="100">

        <label>Descripción</label>
        <textarea id="inpDesc" placeholder="Descripción opcional..." maxlength="500"></textarea>

        <div class="toggle-row">
            <div>
                <div class="toggle-label">🌐 Mazo público</div>
                <div class="toggle-sub">Otros usuarios podrán ver y buscar este mazo</div>
            </div>
            <label class="toggle">
                <input type="checkbox" id="togPublico">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-guardar" id="btnGuardar" onclick="guardarInfo()" style="margin-top:18px">
            💾 Guardar cambios
        </button>
    </div>

    <!-- CARTAS DEL MAZO -->
    <div class="seccion">
        <h2>🃏 Cartas del mazo</h2>

        <!-- Añadir carta -->
        <div class="add-row">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="inputBusqueda" placeholder="Buscar carta para añadir..." autocomplete="off">
                <div class="dropdown" id="dropdown"></div>
            </div>
            <input type="number" id="cantidad" value="1" min="1" max="4" title="Cantidad">
            <button class="btn-add" onclick="agregarCarta()">+ Añadir</button>
        </div>
        <div id="selPill" style="display:none; margin-top:8px; font-size:0.83rem; color:#0369A1; background:#E1F5FE; padding:7px 12px; border-radius:8px; border:2px solid #BAE6FD;">
            Seleccionada: <strong id="selNombre">—</strong>
            <button onclick="limpiar()" style="margin-left:8px; background:none; border:none; cursor:pointer; color:#AAA;">✕</button>
        </div>

        <div class="grid-cartas" id="gridCartas">
            <div class="estado-vacio" style="grid-column:1/-1">⏳ Cargando...</div>
        </div>
    </div>

</div>

<div class="toast" id="toast"></div>

<script th:inline="javascript">
    const MAZO_ID   = /*[[${mazoId}]]*/ 1;
    const USUARIO_ID = /*[[${usuarioId}]]*/ 1;
    const API       = '/api/mazos';
    const API_CARTAS = '/api/cartas';

    let cartaSeleccionada = null;
    let timerBusq = null;

    // ── Cargar info del mazo ─────────────────────────────────────────────────
    async function cargarInfo() {
        try {
            const res = await fetch(`${API}/usuario/${USUARIO_ID}`);
            const mazos = await res.json();
            const mazo  = mazos.find(m => m.id == MAZO_ID);
            if (mazo) {
                document.getElementById('inpNombre').value  = mazo.nombre || '';
                document.getElementById('inpDesc').value    = mazo.descripcion || '';
                document.getElementById('togPublico').checked = !!mazo.esPublico;
            }
        } catch { mostrarToast('Error al cargar info del mazo', 'error'); }
    }

    // ── Guardar info ─────────────────────────────────────────────────────────
    async function guardarInfo() {
        const nombre    = document.getElementById('inpNombre').value.trim();
        const desc      = document.getElementById('inpDesc').value.trim();
        const esPublico = document.getElementById('togPublico').checked;
        if (!nombre) return mostrarToast('El nombre es obligatorio', 'error');

        const btn = document.getElementById('btnGuardar');
        btn.disabled = true; btn.textContent = 'Guardando...';
        try {
            const params = new URLSearchParams({ nombre, descripcion: desc, esPublico });
            const res = await fetch(`${API}/${MAZO_ID}/renombrar?${params}`, { method: 'PATCH' });
            if (res.ok) {
                mostrarToast('Cambios guardados ✓', 'exito');
            } else {
                const e = await res.json().catch(()=>{});
                mostrarToast(e?.mensaje || 'Error al guardar', 'error');
            }
        } catch { mostrarToast('Error de conexión', 'error'); }
        finally { btn.disabled = false; btn.textContent = '💾 Guardar cambios'; }
    }

    // ── Cargar cartas ────────────────────────────────────────────────────────
    async function cargarCartas() {
        try {
            const res    = await fetch(`${API}/${MAZO_ID}/cartas`);
            const cartas = await res.json();
            renderCartas(cartas);
        } catch {
            document.getElementById('gridCartas').innerHTML =
                '<div class="estado-vacio" style="grid-column:1/-1">⚠️ Error al cargar</div>';
        }
    }

    function renderCartas(cartas) {
        const grid = document.getElementById('gridCartas');
        if (!cartas.length) {
            grid.innerHTML = '<div class="estado-vacio" style="grid-column:1/-1">🃏 El mazo está vacío</div>';
            return;
        }
        grid.innerHTML = cartas.map(c => `
            <div class="carta-card" id="cc-${c.cartaId}">
                ${c.imagenUrl
                    ? `<img class="carta-img" src="${c.imagenUrl}" alt="${c.cartaNombre||''}" loading="lazy">`
                    : `<div style="height:130px; background:#F5F5F5; display:flex; align-items:center; justify-content:center; font-size:2rem;">🃏</div>`}
                <div class="carta-body">
                    <div class="carta-nombre">${c.cartaNombre || 'Carta #'+c.cartaId}</div>
                    <div class="carta-qty">× ${c.cantidad}</div>
                </div>
                <button class="btn-quitar-carta" onclick="quitarCarta(${c.cartaId})">🗑 Quitar</button>
            </div>
        `).join('');
    }

    // ── Buscar carta (PokémonTCG API) ────────────────────────────────────────
    const inputBusq = document.getElementById('inputBusqueda');
    const dropdown  = document.getElementById('dropdown');

    inputBusq.addEventListener('input', () => {
        clearTimeout(timerBusq);
        const q = inputBusq.value.trim();
        if (q.length < 2) { cerrarDropdown(); return; }
        timerBusq = setTimeout(() => buscar(q), 350);
    });
    document.addEventListener('click', e => {
        if (!inputBusq.contains(e.target) && !dropdown.contains(e.target)) cerrarDropdown();
    });

    async function buscar(q) {
        dropdown.innerHTML = '<div class="drop-msg">Buscando...</div>';
        dropdown.classList.add('open');
        try {
            const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=name:${encodeURIComponent(q)}&pageSize=8`);
            const data = await res.json();
            const cartas = data.data || [];
            if (!cartas.length) { dropdown.innerHTML = '<div class="drop-msg">Sin resultados</div>'; return; }
            dropdown.innerHTML = cartas.map(c => {
                const img = c.images?.small || '';
                return `<div class="drop-item" onclick="seleccionar('${esc(c.name)}','${esc(c.rarity||'')}','${esc(c.set?.id||'')}','${esc(img)}')">
                    ${img ? `<img class="drop-img" src="${img}" alt="${c.name}" loading="lazy">` : '<span style="width:30px;text-align:center">🃏</span>'}
                    <div>
                        <div class="drop-nombre">${c.name}</div>
                        <div class="drop-sub">${c.rarity||''} · ${c.set?.name||''}</div>
                    </div>
                </div>`;
            }).join('');
        } catch { dropdown.innerHTML = '<div class="drop-msg">Error al buscar</div>'; }
    }

    function seleccionar(nombre, rareza, setCodigo, imagenUrl) {
        cartaSeleccionada = { nombre, rareza, setCodigo, imagenUrl };
        inputBusq.value = nombre;
        cerrarDropdown();
        document.getElementById('selNombre').textContent = nombre;
        document.getElementById('selPill').style.display = 'flex';
        document.getElementById('selPill').style.alignItems = 'center';
    }

    function limpiar() {
        cartaSeleccionada = null;
        inputBusq.value = '';
        document.getElementById('selPill').style.display = 'none';
    }
    function cerrarDropdown() { dropdown.classList.remove('open'); dropdown.innerHTML = ''; }

    // ── Añadir carta ─────────────────────────────────────────────────────────
    async function agregarCarta() {
        if (!cartaSeleccionada) return mostrarToast('Selecciona una carta primero', 'error');
        const cantidad = parseInt(document.getElementById('cantidad').value) || 1;
        try {
            // Importar carta si tiene setCodigo
            let cartaId = null;
            if (cartaSeleccionada.setCodigo) {
                const imp = await fetch('/api/cartas/importar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nombre: cartaSeleccionada.nombre,
                        setCodigo: cartaSeleccionada.setCodigo,
                        rareza: cartaSeleccionada.rareza,
                        imagenUrl: cartaSeleccionada.imagenUrl || ''
                    })
                });
                if (imp.ok) { const d = await imp.json(); cartaId = d.id; }
            }
            if (!cartaId) return mostrarToast('No se pudo importar la carta', 'error');

            const res = await fetch(`${API}/${MAZO_ID}/cartas/${cartaId}?cantidad=${cantidad}`, { method: 'POST' });
            if (res.ok) {
                mostrarToast('Carta añadida ✓', 'exito');
                limpiar();
                document.getElementById('cantidad').value = 1;
                cargarCartas();
            } else {
                const e = await res.json().catch(()=>{});
                mostrarToast(e?.mensaje || 'Error al añadir', 'error');
            }
        } catch { mostrarToast('Error de conexión', 'error'); }
    }

    // ── Quitar carta ─────────────────────────────────────────────────────────
    async function quitarCarta(cartaId) {
        const el = document.getElementById('cc-' + cartaId);
        if (el) { el.style.opacity='0'; el.style.transform='scale(0.9)'; el.style.transition='0.25s'; }
        try {
            const res = await fetch(`${API}/${MAZO_ID}/cartas/${cartaId}`, { method: 'DELETE' });
            if (res.ok) { mostrarToast('Carta eliminada', 'exito'); setTimeout(cargarCartas, 280); }
            else mostrarToast('Error al eliminar', 'error');
        } catch { mostrarToast('Error de conexión', 'error'); }
    }

    function mostrarToast(msg, tipo='exito') {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = `toast ${tipo} visible`;
        setTimeout(() => t.classList.remove('visible'), 3000);
    }
    function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

    cargarInfo();
    cargarCartas();
</script>
</body>
</html>
